name: Metrics
on:
  schedule:
    cron: "0 13 * * *"  # This runs at 13:00 UTC (1 PM)
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: vibhanshu054
          template: default
          base: "header,activity,community,repositories,support"
          output_action: commit
          commit_message: "chore: update metrics"
